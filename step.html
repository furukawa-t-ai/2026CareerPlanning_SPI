<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>SPI3 対策模擬テスト 第7回</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 詳細解説のアニメーション用 */
        .expand-transition {
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .expand-transition.open {
            max-height: 800px;
            opacity: 1;
        }
        .detail-box {
            background: rgba(255, 255, 255, 0.7);
            border-left: 4px solid #4f46e5; /* Indigo 600 */
            padding: 16px;
            border-radius: 4px 8px 8px 4px;
            margin-top: 12px;
        }
        .highlight {
            background: linear-gradient(transparent 60%, #c7d2fe 60%); /* Indigo 200 */
            font-weight: bold;
            color: #312e81; /* Indigo 900 */
        }
        /* 資料解釈用テーブルデザイン */
        .data-table-wrapper {
            background-color: #ffffff;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            color: #334155;
        }
        .data-table th, .data-table td {
            border: 1px solid #cbd5e1;
            padding: 10px 14px;
            text-align: center;
        }
        .data-table th {
            background-color: #e0e7ff; /* Indigo 100 */
            color: #312e81; /* Indigo 900 */
            font-weight: bold;
            white-space: nowrap;
        }
        .data-table tr:nth-child(even) td {
            background-color: #f8fafc;
        }
        .data-table td:first-child {
            font-weight: bold;
            background-color: #f1f5f9;
        }
        .math-text {
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            color: #3730a3; /* Indigo 800 */
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4">
    <div id="app" class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="inline-block bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded-full mb-2">全10回シリーズ</div>
            <h1 class="text-3xl font-bold text-slate-800">SPI3 対策模擬テスト</h1>
            <p class="text-lg font-medium text-indigo-600 mt-1">【第7回】非言語・図表と資料解釈編</p>
        </header>

        <!-- Quiz Container -->
        <div id="quiz-container" class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 md:p-10 fade-in">
            <!-- Progress -->
            <div class="mb-8">
                <div class="flex justify-between items-end mb-3">
                    <span id="progress-text" class="text-slate-500 font-bold text-sm">QUESTION 1 / 5</span>
                    <span id="score-text" class="text-indigo-600 font-bold text-sm">正解数: 0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3">
                    <div id="progress-bar" class="bg-indigo-500 h-3 rounded-full transition-all duration-500" style="width: 20%"></div>
                </div>
            </div>

            <!-- Question Section -->
            <div id="question-content">
                <div id="category-badge" class="inline-block px-3 py-1 rounded-md text-xs font-bold mb-4 bg-slate-100 text-slate-600 tracking-wider"></div>
                <div id="question-text" class="text-lg font-medium text-slate-800 mb-6 leading-relaxed"></div>
                
                <div id="options-container" class="grid grid-cols-1 gap-4">
                    <!-- Options -->
                </div>

                <!-- Explanation Area -->
                <div id="explanation-container" class="hidden mt-10 p-6 rounded-2xl border-2 fade-in">
                    <div class="flex items-center mb-4">
                        <div id="result-icon" class="mr-3"></div>
                        <div id="result-badge" class="font-bold text-xl"></div>
                    </div>
                    
                    <div class="bg-white/60 rounded-xl p-5 mb-6 shadow-sm">
                        <!-- 簡潔な解説 -->
                        <p id="short-explanation-text" class="text-slate-800 font-medium leading-relaxed"></p>
                        
                        <!-- 更に詳しくボタン -->
                        <button id="toggle-detail-btn" class="mt-4 flex items-center text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors focus:outline-none">
                            <svg id="toggle-icon" class="w-4 h-4 mr-1 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            <span>更に詳しく解説（解法のプロセスと工夫）</span>
                        </button>

                        <!-- 詳細な解説（初期状態は非表示） -->
                        <div id="detailed-explanation-wrapper" class="expand-transition">
                            <div class="detail-box">
                                <div id="detailed-explanation-text" class="text-slate-700 text-sm leading-relaxed space-y-3"></div>
                            </div>
                        </div>
                    </div>

                    <button id="next-btn" class="w-full py-4 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-900 transition-all active:scale-[0.98] shadow-lg shadow-slate-200">
                        次の問題へ進む
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden bg-white rounded-3xl shadow-2xl border border-slate-100 p-10 text-center fade-in">
            <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-indigo-50 rounded-full">
                <!-- Bar chart icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">第7回 終了！</h2>
            <p class="text-slate-500 mb-8">お疲れ様でした。今回の図表・資料解釈スコアは...</p>
            
            <div class="relative inline-block mb-10">
                <div class="text-7xl font-black text-indigo-600">
                    <span id="final-score">0</span><span class="text-3xl text-slate-300">/5</span>
                </div>
            </div>
            
            <p id="result-message" class="text-lg font-bold text-slate-700 mb-10 px-4"></p>
            
            <div class="space-y-3">
                <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                    もう一度挑戦
                </button>
                <p class="text-sm text-slate-400">次回の「第8回：実践・スピード強化編」もお楽しみに！</p>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                category: "非言語：資料解釈（割合の計算）",
                question: "【資料1】A市、B市、C市の人口と面積<br><div class='data-table-wrapper'><table class='data-table'><thead><tr><th>都市</th><th>人口（万人）</th><th>面積（km&sup2;）</th></tr></thead><tbody><tr><td>A市</td><td>120</td><td>400</td></tr><tr><td>B市</td><td>80</td><td>200</td></tr><tr><td>C市</td><td>150</td><td>600</td></tr></tbody></table></div>資料1から、人口密度（1km&sup2;あたりの人口）が最も高い都市と、その人口密度（人/km&sup2;）の組み合わせとして正しいものはどれか。",
                options: [
                    { text: "A市：3,000人/km&sup2;", isCorrect: false },
                    { text: "B市：4,000人/km&sup2;", isCorrect: true },
                    { text: "C市：2,500人/km&sup2;", isCorrect: false },
                    { text: "A市：2,500人/km&sup2;", isCorrect: false }
                ],
                shortExplanation: "人口密度＝人口÷面積です。B市は「80万人 ÷ 200km² = 0.4万人 = 4,000人」となり、最も高くなります。",
                detailedExplanation: "<p><strong>【解法のプロセス：単位に注意して計算する】</strong></p><p>人口密度は <span class='highlight'>「人口 ÷ 面積」</span> で求めます。表の人口は「万人（10,000倍）」であることに注意しましょう。</p><p>・A市：120万人 ÷ 400 ＝ 0.3万人 ＝ <span class='math-text'>3,000人/km&sup2;</span><br>・B市：80万人 ÷ 200 ＝ 0.4万人 ＝ <span class='math-text'>4,000人/km&sup2;</span><br>・C市：150万人 ÷ 600 ＝ 0.25万人 ＝ <span class='math-text'>2,500人/km&sup2;</span></p><p>よって、最も高いのはB市で、4,000人/km²となります。</p>"
            },
            {
                category: "非言語：資料解釈（伸び率）",
                question: "【資料2】ある店舗の月別売上高（単位：万円）<br><div class='data-table-wrapper'><table class='data-table'><thead><tr><th>月</th><th>4月</th><th>5月</th><th>6月</th><th>7月</th></tr></thead><tbody><tr><td>売上</td><td>420</td><td>462</td><td>508</td><td>480</td></tr></tbody></table></div>4月から5月にかけての売上の増加率（伸び率）は何％か。",
                options: [
                    { text: "8%", isCorrect: false },
                    { text: "10%", isCorrect: true },
                    { text: "12%", isCorrect: false },
                    { text: "15%", isCorrect: false }
                ],
                shortExplanation: "増加量（462 - 420 = 42）を、基準となる4月の売上（420）で割ります。42 ÷ 420 = 0.1となり、10%です。",
                detailedExplanation: "<p><strong>【解法のプロセス：伸び率・増加率の公式】</strong></p><p>伸び率の公式は <span class='highlight'>「増加量 ÷ 基準となる値」</span> です。基準となる値は「古い方の月（変化する前）」であることに注意してください。</p><p>① 増加量を出す<br><span class='math-text'>462 - 420 ＝ 42万円</span></p><p>② 基準（4月の売上）で割る<br><span class='math-text'>42 ÷ 420 ＝ 0.1</span></p><p>③ パーセントに直す<br>0.1 × 100 ＝ <span class='math-text'>10%</span> となります。</p>"
            },
            {
                category: "非言語：計算の工夫（概算）",
                question: "【資料2】ある店舗の月別売上高（単位：万円）<br><div class='data-table-wrapper'><table class='data-table'><thead><tr><th>月</th><th>4月</th><th>5月</th><th>6月</th><th>7月</th></tr></thead><tbody><tr><td>売上</td><td>420</td><td>462</td><td>508</td><td>480</td></tr></tbody></table></div>5月から6月にかけての売上の増加率は、およそ何％か。最も近いものを選べ。",
                options: [
                    { text: "約 8%", isCorrect: false },
                    { text: "約 10%", isCorrect: true },
                    { text: "約 12%", isCorrect: false },
                    { text: "約 15%", isCorrect: false }
                ],
                shortExplanation: "増加量は 508 - 462 = 46 です。46 ÷ 462 を真面目に計算せず、462を「約460」と見立てると 46/460 = 10% と瞬時に導けます。",
                detailedExplanation: "<p><strong>【解法のプロセス：SPI最強の武器「概算」】</strong></p><p>SPIの資料解釈では、<span class='highlight'>まともに割り算をすると時間が足りません。</span> およその数（概算）を使ってショートカットします。</p><p>① 増加量を出す<br><span class='math-text'>508 - 462 ＝ 46</span></p><p>② 式を立てる<br>46 ÷ 462（※ここで筆算をしてはいけません！）</p><p>③ 分母を丸める<br>分母の462を、計算しやすい「460」だと考えます。<br><span class='math-text'>46 / 460 ＝ 1 / 10 ＝ 0.1</span></p><p>よって、答えは「約10%」と一瞬で特定できます。</p>"
            },
            {
                category: "非言語：複数データのクロス集計",
                question: "【資料3】X社、Y社、Z社の従業員数と男女比<br><div class='data-table-wrapper'><table class='data-table'><thead><tr><th>会社</th><th>従業員総数</th><th>男性比率</th></tr></thead><tbody><tr><td>X社</td><td>600人</td><td>60%</td></tr><tr><td>Y社</td><td>400人</td><td>45%</td></tr><tr><td>Z社</td><td>500人</td><td>50%</td></tr></tbody></table></div>X社とY社の「女性従業員」の合計人数は何人か。",
                options: [
                    { text: "440人", isCorrect: false },
                    { text: "460人", isCorrect: true },
                    { text: "480人", isCorrect: false },
                    { text: "500人", isCorrect: false }
                ],
                shortExplanation: "男性比率から女性比率を逆算します。X社の女性は 600×0.4＝240人。Y社の女性は 400×0.55＝220人。合計して460人です。",
                detailedExplanation: "<p><strong>【解法のプロセス：女性比率への変換】</strong></p><p>表には男性比率しか載っていないため、「全体の100% から男性比率を引いたものが女性比率」と考えます。</p><p>① X社の女性人数<br>男性が60%なので、女性は40%（0.4）です。<br><span class='math-text'>600 × 0.4 ＝ 240人</span></p><p>② Y社の女性人数<br>男性が45%なので、女性は55%（0.55）です。<br><span class='math-text'>400 × 0.55 ＝ 220人</span></p><p>③ 合計する<br><span class='math-text'>240 ＋ 220 ＝ 460人</span> となります。</p>"
            },
            {
                category: "非言語：資料解釈（平均の罠）",
                question: "【資料3（再掲）】X社、Y社、Z社の従業員数と男女比<br><div class='data-table-wrapper'><table class='data-table'><thead><tr><th>会社</th><th>従業員総数</th><th>男性比率</th></tr></thead><tbody><tr><td>X社</td><td>600人</td><td>60%</td></tr><tr><td>Y社</td><td>400人</td><td>45%</td></tr><tr><td>Z社</td><td>500人</td><td>50%</td></tr></tbody></table></div>X社、Y社、Z社の3社を合わせた全体の「男性従業員」の比率はおよそ何％か。最も近いものを選べ。",
                options: [
                    { text: "約 50%", isCorrect: false },
                    { text: "約 51%", isCorrect: false },
                    { text: "約 53%", isCorrect: true },
                    { text: "約 55%", isCorrect: false }
                ],
                shortExplanation: "比率（%）をそのまま足して割ってはいけません。各社の男性の「実数」を出して合計し、全体の総人数で割る必要があります。",
                detailedExplanation: "<p><strong>【解法のプロセス：比率の平均に関する絶対ルール】</strong></p><p><span class='text-red-600 font-bold'>【よくある罠】</span> (60 + 45 + 50) ÷ 3 ＝ 51.6% としてはいけません。母数（従業員総数）が違うため、比率の単純平均は間違いになります。</p><p>① 各社の男性の実数を出す<br>X社：<span class='math-text'>600 × 0.6 ＝ 360人</span><br>Y社：<span class='math-text'>400 × 0.45 ＝ 180人</span><br>Z社：<span class='math-text'>500 × 0.5 ＝ 250人</span><br>男性の合計 ＝ <span class='math-text'>360 ＋ 180 ＋ 250 ＝ 790人</span></p><p>② 3社全体の総人数を出す<br><span class='math-text'>600 + 400 + 500 ＝ 1500人</span></p><p>③ 全体の男性比率を求める<br><span class='math-text'>790 ÷ 1500 ＝ 79 ÷ 150 ≒ 0.526</span></p><p>よって「約53%」が正解です。</p>"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let isAnswered = false;

        // 要素の取得
        const toggleBtn = document.getElementById('toggle-detail-btn');
        const detailWrapper = document.getElementById('detailed-explanation-wrapper');
        const toggleIcon = document.getElementById('toggle-icon');
        const toggleText = toggleBtn.querySelector('span');

        function loadQuestion() {
            isAnswered = false;
            const data = quizData[currentQuestion];
            
            document.getElementById('category-badge').textContent = data.category;
            document.getElementById('question-text').innerHTML = data.question;
            document.getElementById('progress-text').textContent = `QUESTION ${currentQuestion + 1} / ${quizData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / quizData.length) * 100}%`;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "group w-full text-left p-4 md:p-5 border-2 border-slate-100 rounded-2xl hover:bg-indigo-50 hover:border-indigo-200 transition-all duration-200 focus:outline-none flex items-center";
                btn.innerHTML = `
                    <span class="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-slate-50 text-slate-400 rounded-full mr-4 font-bold group-hover:bg-indigo-100 group-hover:text-indigo-600 transition-colors">${String.fromCharCode(65 + index)}</span>
                    <span class="text-slate-700 font-medium">${opt.text}</span>
                `;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            // 解説エリアをリセットして隠す
            document.getElementById('explanation-container').classList.add('hidden');
            
            // 更に詳しくボタンの状態リセット
            detailWrapper.classList.remove('open');
            toggleIcon.classList.remove('rotate-180');
            toggleText.textContent = "更に詳しく解説（解法のプロセスと工夫）";
        }

        function selectOption(index) {
            if (isAnswered) return;
            isAnswered = true;

            const correctIndex = quizData[currentQuestion].options.findIndex(o => o.isCorrect);
            const options = document.getElementById('options-container').children;

            if (index === correctIndex) {
                score++;
                options[index].classList.replace('border-slate-100', 'border-green-500');
                options[index].classList.add('bg-green-50');
                showExplanation(true);
            } else {
                options[index].classList.replace('border-slate-100', 'border-red-500');
                options[index].classList.add('bg-red-50');
                options[correctIndex].classList.replace('border-slate-100', 'border-green-500');
                options[correctIndex].classList.add('bg-green-50');
                showExplanation(false);
            }
            document.getElementById('score-text').textContent = `正解数: ${score}`;
        }

        function showExplanation(isCorrect) {
            const container = document.getElementById('explanation-container');
            const badge = document.getElementById('result-badge');
            const icon = document.getElementById('result-icon');
            const shortText = document.getElementById('short-explanation-text');
            const detailText = document.getElementById('detailed-explanation-text');
            
            container.classList.remove('hidden');
            
            if (isCorrect) {
                container.className = "mt-10 p-6 rounded-2xl border-2 fade-in bg-green-50 border-green-100";
                badge.textContent = "正解です！";
                badge.className = "text-green-700 font-bold text-xl";
                icon.innerHTML = '<div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white">✓</div>';
            } else {
                container.className = "mt-10 p-6 rounded-2xl border-2 fade-in bg-red-50 border-red-100";
                badge.textContent = "不正解です...";
                badge.className = "text-red-700 font-bold text-xl";
                icon.innerHTML = '<div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white">×</div>';
            }
            
            shortText.innerHTML = quizData[currentQuestion].shortExplanation;
            detailText.innerHTML = quizData[currentQuestion].detailedExplanation;
        }

        // アコーディオン（更に詳しく）の開閉ロジック
        toggleBtn.addEventListener('click', () => {
            const isOpen = detailWrapper.classList.contains('open');
            if (isOpen) {
                detailWrapper.classList.remove('open');
                toggleIcon.classList.remove('rotate-180');
                toggleText.textContent = "更に詳しく解説（解法のプロセスと工夫）";
            } else {
                detailWrapper.classList.add('open');
                toggleIcon.classList.add('rotate-180');
                toggleText.textContent = "解説を閉じる";
            }
        });

        document.getElementById('next-btn').onclick = () => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            document.getElementById('quiz-container').classList.add('hidden');
            const resultScreen = document.getElementById('result-screen');
            resultScreen.classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
            
            let message = "";
            if (score === 5) message = "パーフェクト！データの読み取りと概算テクニックが完全に身についています。";
            else if (score >= 3) message = "表の読み取りの基礎はできています。「概算」を使って筆算を減らす練習をすると、さらにタイムが縮まります。";
            else message = "資料解釈はSPIの最重要分野です。解説にある「比率の平均の罠」や「概算のコツ」をしっかり復習しましょう。";
            
            document.getElementById('result-message').textContent = message;
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
